<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 110%; scroll-behavior: smooth; }
    :root {
      --bg: #F8F9FA; --surface: #F1F3F4; --text: #202124; --text-secondary: #5F6368;
      --text-muted: #9AA0A6; --accent: #4285F4; --accent-light: #E8F0FE;
      --accent-hover: #3367D6; --border: #DADCE0; --white: #FFFFFF;
      --shadow-sm: 0 1px 3px rgba(32,33,36,0.06); --shadow-md: 0 4px 16px rgba(32,33,36,0.08);
      --radius: 20px; --radius-sm: 12px; --radius-full: 9999px;
      --font: 'Outfit','Noto Sans TC',system-ui,sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    .error-page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 24px; }
    .error-code { font-size: 6rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 16px; }
    .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .error-desc { color: var(--text-secondary); margin-bottom: 32px; max-width: 400px; }
    .error-btn { display: inline-block; padding: 12px 32px; background: var(--accent); color: var(--white); border-radius: var(--radius-full); font-weight: 600; font-size: 0.95rem; transition: background 0.2s; }
    .error-btn:hover { background: var(--accent-hover); color: var(--white); }

    .site-footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; font-size: 0.8rem; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>

<body>
  <main class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">找不到頁面</h1>
      <p class="error-desc">你要找的頁面不存在或已被移除。請確認網址是否正確，或回到首頁重新開始。</p>
      <a href="/" class="error-btn">回到首頁</a>
    </div>
  </main>

  <footer class="site-footer">

        <a href="/privacy.html">隱私權政策</a>
        <a href="/refund.html">退款政策</a>
      </div>
      <p class="footer-copy">&copy; 2026 GBP SEO 優化服務. All rights reserved.</p>
    </div>
  </footer>
</body>

</html>
